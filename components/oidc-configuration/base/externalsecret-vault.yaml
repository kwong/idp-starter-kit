# ExternalSecret: Vault OIDC Client Secret
# ---------------------------------------------------------------------------
# Pulls the Vault OIDC client secret from Vault KV at secret/identity-provider/vault
# and materialises it as a Kubernetes Secret in the vault namespace.
# The Vault init-job reads this Secret to configure the OIDC auth method,
# rather than having the secret hardcoded in the Job manifest.
#
# Prerequisite (Phase 0):
#   vault kv put secret/identity-provider/vault client_secret="<your-secret>"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-oidc-secret
  namespace: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-store
    kind: ClusterSecretStore
  target:
    name: vault-oidc-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: idp-starter-kit
  data:
    - secretKey: oidc_client_secret
      remoteRef:
        key: secret/identity-provider/vault
        property: client_secret
