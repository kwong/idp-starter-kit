apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-config
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: idp-starter-kit
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # This ConfigMap is auto-populated by the oidc-config kustomize module.
    # For mode=internal: URLs point to the in-cluster Keycloak instance.
    # For mode=external: URLs are derived from the issuer_url in platform-values.yaml.
    # Do NOT edit this file directly — edit platform-values.yaml at the repo root.
    idp-starter-kit/mode: "internal"
data:
  # ----- Core OIDC Discovery -----------------------------------------------
  # The OIDC Issuer URL. All other endpoint URLs are derived from this
  # via OIDC Discovery (/.well-known/openid-configuration).
  # Components that require explicit endpoint URLs (e.g. Grafana generic_oauth)
  # have those URLs pre-computed below.
  issuer_url: "http://keycloak.keycloak.svc.cluster.local:80/realms/idp"

  # External-facing issuer URL (used in browser redirects, logout links, etc.)
  issuer_url_external: "http://keycloak.local/realms/idp"

  # ----- Role/Group Claim --------------------------------------------------
  # The JWT claim name that carries group membership.
  # Components use this to build their RBAC claim path expressions.
  groups_claim: "roles"

  # ----- OIDC Client IDs ---------------------------------------------------
  argocd_client_id: "argocd"
  grafana_client_id: "grafana"
  vault_client_id: "vault"

  # ----- Pre-computed OIDC Endpoints ---------------------------------------
  # These are the standard OIDC well-known URL suffixes appended to the
  # realm base URL. Pre-computed here so components do not need to do
  # string concatenation or dynamic lookups.
  # Grafana's generic_oauth does not support automatic discovery; it needs
  # explicit auth/token/api URLs.

  # Auth endpoint (browser redirect for login)
  oidc_auth_url: "http://keycloak.local/realms/idp/protocol/openid-connect/auth"

  # Token endpoint (server-side code exchange)
  oidc_token_url: "http://keycloak.local/realms/idp/protocol/openid-connect/token"

  # Userinfo endpoint (for profile/group claims)
  oidc_api_url: "http://keycloak.local/realms/idp/protocol/openid-connect/userinfo"

  # Logout endpoint (for post-logout redirect)
  oidc_logout_url: "http://keycloak.local/realms/idp/protocol/openid-connect/logout"

  # ----- RBAC Group Mappings -----------------------------------------------
  # These group names must exist in the IdP and be included in the groups_claim.
  # For external IdPs, update these to match your existing group names.
  rbac_admin_group: "platform-admins"
  rbac_dev_group: "developers"
