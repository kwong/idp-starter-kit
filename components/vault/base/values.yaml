server:
  # -------------------------------------------------------------------------
  # Dev Mode (local kind cluster only)
  # -------------------------------------------------------------------------
  # dev.enabled=true causes Vault to start in dev mode: it auto-unseals,
  # stores all data in memory, and prints a root token to stdout on startup.
  #
  # IMPORTANT: The root token is ephemeral — it is printed to pod logs and
  # is discarded when the pod restarts. It is NEVER hardcoded here.
  # The bootstrap script (hack/setup.sh) reads it from pod logs at Phase 0
  # using: kubectl logs -n vault <pod> | grep 'Root Token'
  #
  # For production, set dev.enabled=false and configure the seal stanza below.
  dev:
    enabled: true
    # devRootToken is intentionally NOT set here.
    # Vault generates a random ephemeral token on each startup.

  # -------------------------------------------------------------------------
  # Production: Cloud KMS Auto-Unseal
  # -------------------------------------------------------------------------
  # Uncomment and fill in the appropriate seal stanza for your cloud provider.
  # When KMS auto-unseal is active, Vault initialises with key shares that are
  # immediately wrapped by the KMS key. No unseal key or root token is ever
  # stored in Git, Kubernetes Secrets, or environment variables.
  #
  # After enabling KMS, run vault operator init once (via Terraform or manually)
  # and store the recovery keys securely (e.g. in a password manager). The root
  # token produced at init time is used ONCE for Phase 0 bootstrapping and then
  # revoked: vault token revoke <root-token>
  #
  # AWS KMS (for EKS):
  # extraEnvironmentVars:
  #   VAULT_SEAL_TYPE: awskms
  # ha:
  #   enabled: true
  # seal:
  #   awskms:
  #     region: "us-east-1"
  #     kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/mrk-xxxxxxxx"
  #
  # GCP KMS (for GKE):
  # extraEnvironmentVars:
  #   VAULT_SEAL_TYPE: gcpckms
  # seal:
  #   gcpckms:
  #     project: "my-project"
  #     region: "global"
  #     key_ring: "vault"
  #     crypto_key: "vault-unseal"

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: vault.local
        paths: []

ui:
  enabled: true
  serviceType: "ClusterIP"
