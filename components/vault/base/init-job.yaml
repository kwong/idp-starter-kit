apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-config
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-config
          image: hashicorp/vault:1.15.4
          envFrom:
            - configMapRef:
                name: oidc-config
                optional: true
            - secretRef:
                name: vault-oidc-secret
                optional: true
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for Vault..."
              sleep 10

              # DEV MODE ONLY: Attempt to extract the ephemeral root token from Vault pod logs.
              # Production (KMS mode) requires the root token to be securely retrieved or passed
              # via Vault's Kubernetes Auth Method (which would be bootstrapped by Terraform).
              # Here we assume local dev mode.
              if [ -z "$VAULT_TOKEN" ]; then
                echo "Attempting to retrieve ephemeral dev root token via kubectl..."
                apk add --no-cache curl kubectl || true
                export VAULT_TOKEN=$(kubectl logs -n vault -l app.kubernetes.io/name=vault | grep 'Root Token:' | head -n 1 | awk '{print $3}')
                if [ -z "$VAULT_TOKEN" ]; then
                  echo "WARNING: Could not retrieve dev root token. Vault OIDC/KV config might fail."
                fi
              fi

              echo "Enabling KV-V2 Secrets Engine..."
              vault secrets enable -path=secret kv-v2 || true

              echo "Enabling Kubernetes Auth..."
              vault auth enable kubernetes || true
              vault write auth/kubernetes/config \
                kubernetes_host="https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT" || true

              echo "Binding ESO to Vault Kubernetes Role..."
              vault write auth/kubernetes/role/eso \
                bound_service_account_names=vault-auth-sa \
                bound_service_account_namespaces=external-secrets \
                policies=eso-policy \
                ttl=1h

              if [ -n "$issuer_url" ] && [ -n "$oidc_client_secret" ]; then
                echo "Enabling OIDC Auth via $issuer_url ..."
                vault auth enable oidc || true
                vault write auth/oidc/config \
                  oidc_discovery_url="$issuer_url" \
                  oidc_client_id="$vault_client_id" \
                  oidc_client_secret="$oidc_client_secret" \
                  default_role="default" || true

                vault write auth/oidc/role/default \
                  bound_audiences="$vault_client_id" \
                  allowed_redirect_uris="http://vault.local/ui/vault/auth/oidc/oidc/callback" \
                  user_claim="sub" \
                  groups_claim="$groups_claim" \
                  policies="default" || true
              else
                echo "WARNING: oidc-config or vault-oidc-secret missing. Skipping OIDC config."
              fi
              
              echo "Vault Configured Successfully!"

