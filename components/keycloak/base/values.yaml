# Admin credentials
args:
  - start
  - --import-realm

env:
  - name: KEYCLOAK_ADMIN
    value: "admin"
  - name: KEYCLOAK_ADMIN_PASSWORD
    value: "admin"
  - name: KC_PROXY
    value: "edge"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME
    value: "keycloak.local"
  # Database connection
  - name: KC_DB
    value: "postgres"
  - name: KC_DB_URL
    value: "jdbc:postgresql://keycloak-postgresql:5432/keycloak"
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    value: "postgres-password"

extraVolumes: |
  - name: keycloak-realm
    configMap:
      name: keycloak-realm

extraVolumeMounts: |
  - name: keycloak-realm
    mountPath: /opt/keycloak/data/import
    readOnly: true

ingress:
  enabled: true
  ingressClassName: nginx
  rules:
    - host: keycloak.local
      paths:
        - path: /
          pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"

# Disable bundled infinispan
affinity: ""

# Deploy PostgreSQL separately using bitnami/postgresql community chart
# This is a separate release managed outside of keycloakx
