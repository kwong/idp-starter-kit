apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: crossplane
    repo: https://charts.crossplane.io/stable
    version: 1.15.2
    releaseName: crossplane
    namespace: crossplane-system
    valuesFile: values.yaml

# If the Compositions need to be deployed alongside the controller, we can include them here.
# Otherwise, if they have their own ArgoCD App, we leave this empty.
