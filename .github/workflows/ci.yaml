name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add Helm
        uses: azure/setup-helm@v4.2.0

      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint

      - name: Shellcheck
        run: |
          find . -name "*.sh" | xargs shellcheck

      - name: Helm Template Test
        run: |
          # Loop over all components and test helm template with local values if Chart.yaml is present.
          for dir in components/*/*/ ; do
            if [ -f "$dir/Chart.yaml" ] && [ -f "$dir/values.yaml" ]; then
              echo "Testing Helm template for $dir"
              helm template test-release "$dir" -f "$dir/values.yaml" || exit 1
            fi
            # Test external base references if possible
          done

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install Kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Install Kyverno CLI
        run: |
          wget https://github.com/kyverno/kyverno/releases/download/v1.11.4/kyverno-cli_v1.11.4_linux_x86_64.tar.gz
          tar -xzf kyverno-cli_v1.11.4_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/

      - name: Validate with Kubeconform
        run: |
          kustomize build --enable-helm tests/golden-env | kubeconform -strict -summary -ignore-missing-schemas

      - name: Validate against Kyverno Policies
        run: |
          # The IDP starter kit places policies in components/policies/base
          # Ensure there's no policy violations for the golden-env
          kustomize build --enable-helm tests/golden-env > rendered.yaml
          kyverno apply components/policies/base/ --resource rendered.yaml

  e2e-kind:
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        run: make cluster

      - name: Wait for cluster ready
        run: |
          kubectl cluster-info
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

      - name: Bootstrap IDP
        run: make bootstrap

      - name: Wait for ArgoCD Applications Sync
        run: |
          echo "Waiting for ArgoCD applications to sync..."
          # Since ArgoCD spins up components, we can wait for the deployments to become available.
          # Here we give it some time to reconcile.
          sleep 60
          kubectl wait --for=condition=available deployment -l app.kubernetes.io/instance=argocd -n argocd --timeout=300s

          # Check health of platform apps. Wait for key deployments.
          # This should be tailored based on exact critical paths.
          sleep 120
          kubectl get pods -A
