apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  env: dev

# Dev environment overlay — aggregates all platform components.
# ArgoCD's 'idp-dev' Application (bootstrap/dev.yaml) points here.
resources:
  # Identity & Access
  - ../../components/argocd/base
  - ../../components/keycloak/base
  - ../../components/external-secrets/base
  - ../../components/oidc-configuration/base

  # Policy Engine
  - ../../components/kyverno/base
  - ../../components/policies/base

  # Control Plane
  - ../../components/crossplane/base
  - ../../components/crossplane-xapps/base

  # Secrets Backend
  - ../../components/vault/base

  # Observability Stack
  - ../../components/kube-prometheus-stack/base
  - ../../components/loki/base
  - ../../components/tempo/base
  - ../../components/otel-collector/base

# Environment-specific patches for rendered Helm resources.
# Uncomment and populate the relevant -values.yaml file to override defaults.
# patches:
#   - path: argocd-values.yaml
#     target:
#       kind: Deployment
#       namespace: argocd
#   - path: vault-values.yaml
#     target:
#       kind: StatefulSet
#       namespace: vault
#   - path: kube-prometheus-stack-values.yaml
#     target:
#       namespace: monitoring
