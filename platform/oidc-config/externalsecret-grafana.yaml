# ExternalSecret: Grafana OIDC Client Secret
# ---------------------------------------------------------------------------
# Pulls the Grafana OIDC client secret from Vault KV at secret/identity-provider/grafana
# and materialises it as a Kubernetes Secret in the monitoring namespace.
# This Secret is then referenced by Grafana's Helm values via envFromSecret.
#
# Prerequisite (Phase 0):
#   vault kv put secret/identity-provider/grafana client_secret="<your-secret>"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oidc-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-store
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: idp-starter-kit
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: secret/identity-provider/grafana
        property: client_secret
