apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-config
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: vault-config
        image: hashicorp/vault:1.15.4
        env:
        - name: VAULT_ADDR
          value: "http://vault-active.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          value: "root" # Matches devRootToken in values.yaml
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for Vault..."
          sleep 10
          
          echo "Enabling KV-V2 Secrets Engine..."
          vault secrets enable -path=secret kv-v2 || true
          
          echo "Enabling Kubernetes Auth..."
          vault auth enable kubernetes || true
          vault write auth/kubernetes/config \
            kubernetes_host="https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT" || true
            
          echo "Binding ESO to Vault Kubernetes Role..."
          vault write auth/kubernetes/role/eso \
            bound_service_account_names=vault-auth-sa \
            bound_service_account_namespaces=external-secrets \
            policies=eso-policy \
            ttl=1h
            
          echo "Enabling OIDC Auth via Keycloak..."
          vault auth enable oidc || true
          vault write auth/oidc/config \
            oidc_discovery_url="http://keycloak.keycloak.svc.cluster.local:80/realms/idp" \
            oidc_client_id="vault" \
            oidc_client_secret="dummy-secret" \
            default_role="default" || true
            
          vault write auth/oidc/role/default \
            bound_audiences="vault" \
            allowed_redirect_uris="http://vault.local/ui/vault/auth/oidc/oidc/callback" \
            user_claim="sub" \
            policies="default" || true
          
          echo "Vault Configured Successfully!"
