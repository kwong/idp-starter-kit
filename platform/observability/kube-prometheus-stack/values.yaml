kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
  
  grafana:
    enabled: true
    defaultDashboardsEnabled: true
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.local
    # Pass OAuth client_secret as an env var to bypass Grafana's
    # assertNoLeakedSecrets Helm validator (which blocks hardcoded secrets in grafana.ini)
    envFromSecret: ""
    env:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "dummy-secret"
    grafana.ini:
      server:
        root_url: http://grafana.local
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        client_id: grafana
        # Secret is supplied via GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET env var above
        scopes: openid email profile roles
        auth_url: http://keycloak.local/realms/idp/protocol/openid-connect/auth
        token_url: http://keycloak.local/realms/idp/protocol/openid-connect/token
        api_url: http://keycloak.local/realms/idp/protocol/openid-connect/userinfo
        role_attribute_path: contains(roles[*], 'platform-admins') && 'Admin' || 'Viewer'
