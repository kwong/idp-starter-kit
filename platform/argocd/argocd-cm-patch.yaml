apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: "https://argocd.local"
  oidc.config: |
    name: Keycloak
    issuer: http://keycloak.keycloak.svc.cluster.local:80/realms/idp
    clientID: argocd
    # Client secret is dummy or empty for public clients
    clientSecret: ""
    requestedScopes: ["openid", "profile", "email", "groups"]
    logoutURL: http://keycloak.local/realms/idp/protocol/openid-connect/logout
