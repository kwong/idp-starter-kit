apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Group-to-role mappings are driven by the oidc-config ConfigMap values:
  #   rbac_admin_group → role:admin
  #   rbac_dev_group   → role:readonly
  # Update the group names in platform-values.yaml to match your IdP's group names.
  policy.csv: |
    g, ARGOCD_RBAC_ADMIN_GROUP, role:admin
    g, ARGOCD_RBAC_DEV_GROUP, role:readonly
  # The claim name is sourced from oidc-config.groups_claim.
  # Keycloak: "roles" | Entra/Okta/Google: "groups" | GitHub: "teams"
  scopes: "[ARGOCD_OIDC_GROUPS_CLAIM]"
