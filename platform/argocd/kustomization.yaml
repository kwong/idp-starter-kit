apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingress.yaml
  - argocd-cm-patch.yaml
  - argocd-rbac-cm-patch.yaml
  # Pull in the shared oidc-config ConfigMap so Kustomize replacements can read it
  - ../oidc-config/configmap.yaml

# Kustomize replacements: source values from the oidc-config ConfigMap and
# inject them into the ArgoCD ConfigMaps.
# This is the mechanism that makes ArgoCD provider-agnostic — changing
# platform-values.yaml (which updates oidc-config) automatically flows through.
replacements:
  # issuer_url → oidc.config issuer field
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.issuer_url
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.oidc\.config
        options:
          delimiter: "ARGOCD_OIDC_ISSUER_URL"

  # argocd_client_id → oidc.config clientID field
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.argocd_client_id
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.oidc\.config
        options:
          delimiter: "ARGOCD_OIDC_CLIENT_ID"

  # groups_claim → oidc.config requestedScopes + argocd-rbac-cm scopes
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.groups_claim
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.oidc\.config
        options:
          delimiter: "ARGOCD_OIDC_GROUPS_CLAIM"
      - select:
          kind: ConfigMap
          name: argocd-rbac-cm
        fieldPaths:
          - data.scopes
        options:
          delimiter: "ARGOCD_OIDC_GROUPS_CLAIM"

  # oidc_logout_url → oidc.config logoutURL
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.oidc_logout_url
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.oidc\.config
        options:
          delimiter: "ARGOCD_OIDC_LOGOUT_URL"

  # rbac_admin_group → policy.csv admin group
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.rbac_admin_group
    targets:
      - select:
          kind: ConfigMap
          name: argocd-rbac-cm
        fieldPaths:
          - data.policy\.csv
        options:
          delimiter: "ARGOCD_RBAC_ADMIN_GROUP"

  # rbac_dev_group → policy.csv dev group
  - source:
      kind: ConfigMap
      name: oidc-config
      fieldPath: data.rbac_dev_group
    targets:
      - select:
          kind: ConfigMap
          name: argocd-rbac-cm
        fieldPaths:
          - data.policy\.csv
        options:
          delimiter: "ARGOCD_RBAC_DEV_GROUP"
