apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  env: dev

# Golden environment for snapshot and structure testing.
resources:
  # Identity & Access
  - ../../components/argocd/base
  - ../../components/keycloak/base
  - ../../components/external-secrets/base
  - ../../components/oidc-configuration/base

  # Policy Engine
  - ../../components/kyverno/base
  - ../../components/policies/base

  # Control Plane
  - ../../components/crossplane/base

  # Secrets Backend
  - ../../components/vault/base

  # Observability Stack
  - ../../components/kube-prometheus-stack/base
  - ../../components/loki/base
  - ../../components/tempo/base
  - ../../components/otel-collector/base
